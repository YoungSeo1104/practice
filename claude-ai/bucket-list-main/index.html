<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 버킷 리스트</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Gowun+Dodum&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-400 via-blue-400 to-pink-400 py-12">
    <div class="container mx-auto px-4 max-w-4xl">
        <!-- 헤더 -->
        <header class="text-center mb-12">
            <div class="inline-block mb-4">
                <h1 class="text-6xl font-black text-white drop-shadow-lg mb-2">✨ 나의 버킷 리스트</h1>
            </div>
            <p class="text-white text-lg font-medium drop-shadow-md">인생에서 꼭 이루고 싶은 것들을 기록하세요</p>
        </header>

        <!-- 통계 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card stat-blue rounded-2xl p-6 text-black shadow-xl hover:shadow-2xl transition-all transform hover:scale-105">
                <div class="text-4xl font-black mb-2" id="totalCount">0</div>
                <div class="text-sm font-semibold opacity-80">📊 전체</div>
            </div>
            <div class="stat-card stat-green rounded-2xl p-6 text-black shadow-xl hover:shadow-2xl transition-all transform hover:scale-105">
                <div class="text-4xl font-black mb-2" id="completedCount">0</div>
                <div class="text-sm font-semibold opacity-80">✅ 완료</div>
            </div>
            <div class="stat-card stat-orange rounded-2xl p-6 text-black shadow-xl hover:shadow-2xl transition-all transform hover:scale-105">
                <div class="text-4xl font-black mb-2" id="progressCount">0</div>
                <div class="text-sm font-semibold opacity-80">🚀 진행중</div>
            </div>
            <div class="stat-card stat-purple rounded-2xl p-6 text-black shadow-xl hover:shadow-2xl transition-all transform hover:scale-105">
                <div class="text-4xl font-black mb-2" id="completionRate">0%</div>
                <div class="text-sm font-semibold opacity-80">🎯 달성률</div>
            </div>
        </div>

        <!-- 입력 폼 -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8 backdrop-blur-sm bg-opacity-95">
            <form id="bucketForm" class="flex gap-3 flex-col md:flex-row">
                <input
                    type="text"
                    id="bucketInput"
                    placeholder="✍️ 새로운 목표를 입력하세요..."
                    class="flex-1 px-6 py-4 bg-gray-50 border-2 border-gray-200 rounded-2xl focus:outline-none focus:border-purple-400 focus:ring-4 focus:ring-purple-200 font-medium transition-all"
                    required
                >
                <button
                    type="submit"
                    class="px-8 py-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-2xl hover:shadow-xl transition-all font-bold text-lg hover:scale-105 active:scale-95"
                >
                    추가
                </button>
            </form>
        </div>

        <!-- 필터 -->
        <div class="flex gap-3 justify-center mb-8 flex-wrap">
            <button
                class="filter-btn px-8 py-3 rounded-full font-bold transition-all active border-none"
                data-filter="all"
            >
                📋 전체
            </button>
            <button
                class="filter-btn px-8 py-3 rounded-full font-bold transition-all border-none"
                data-filter="active"
            >
                🚀 진행중
            </button>
            <button
                class="filter-btn px-8 py-3 rounded-full font-bold transition-all border-none"
                data-filter="completed"
            >
                ✅ 완료
            </button>
        </div>

        <!-- 버킷 리스트 목록 -->
        <div id="bucketListContainer" class="space-y-4">
            <!-- 동적으로 생성됨 -->
        </div>

        <!-- 빈 상태 메시지 -->
        <div id="emptyState" class="text-center py-16 hidden">
            <div class="text-6xl mb-4">📭</div>
            <p class="text-white text-xl font-bold drop-shadow-lg">아직 버킷 리스트가 없습니다.</p>
            <p class="text-white text-lg font-medium drop-shadow-lg mt-2">위에서 새로운 목표를 추가해보세요!</p>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">버킷 리스트 수정</h3>
            <form id="editForm">
                <input
                    type="text"
                    id="editInput"
                    class="w-full px-6 py-4 bg-gray-50 border-2 border-gray-200 rounded-2xl focus:outline-none focus:border-purple-400 focus:ring-4 focus:ring-purple-200 mb-6 font-medium transition-all"
                    required
                >
                <div class="flex gap-3 justify-end">
                    <button
                        type="button"
                        id="cancelEdit"
                        class="px-6 py-3 bg-gray-200 text-gray-800 rounded-xl hover:bg-gray-300 transition-all font-bold"
                    >
                        취소
                    </button>
                    <button
                        type="submit"
                        class="px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-xl hover:shadow-lg transition-all font-bold"
                    >
                        저장
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
